<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instant Rips — Attack Dashboard</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#fff;--bg2:#f5f5f4;--bg3:#eeece8;
  --tx:#1a1a1a;--tx2:#6b6b6b;
  --bd:rgba(0,0,0,0.12);--bd2:rgba(0,0,0,0.22);
  --r:8px;--rl:12px;
  --ok:#1a7f4b;--info:#185fa5;--bad:#a32d2d;--warn:#92400e;
  --f:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --fm:'SFMono-Regular',Consolas,monospace;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1c1c1a;--bg2:#252522;--bg3:#2e2e2a;
  --tx:#e8e6e0;--tx2:#9a9890;
  --bd:rgba(255,255,255,0.1);--bd2:rgba(255,255,255,0.2);
  --ok:#4ade80;--info:#60a5fa;--bad:#f87171;--warn:#fbbf24;
}}
body{font-family:var(--f);background:var(--bg3);color:var(--tx);min-height:100vh;padding:1.5rem 1rem;}
.wrap{max-width:1200px;margin:0 auto;}
h1{font-size:22px;font-weight:500;margin-bottom:4px;}
.sub{font-size:13px;color:var(--tx2);margin-bottom:1.5rem;}

/* Dashboard grid */
.dashboard{display:grid;grid-template-columns:repeat(auto-fit,minmax(340px,1fr));gap:16px;margin-bottom:2rem;}

/* Pack slot card */
.slot{background:var(--bg);border:0.5px solid var(--bd);border-radius:var(--rl);overflow:hidden;display:flex;flex-direction:column;}
.slot-header{padding:12px 16px;border-bottom:0.5px solid var(--bd);display:flex;align-items:center;justify-content:space-between;gap:8px;}
.slot-price{font-size:18px;font-weight:500;}
.slot-label{font-size:11px;color:var(--tx2);}
.urgency-badge{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:500;padding:4px 10px;border-radius:999px;}
.urg-attack{background:#ef4444;color:#fff;border:1px solid #dc2626;font-size:11px;font-weight:700;letter-spacing:0.04em;padding:5px 12px;box-shadow:0 0 0 0 rgba(239,68,68,0.5);animation:pulse-attack 1.6s ease-in-out infinite;}
.urg-watch{background:#fff7ed;color:#92400e;border:1px solid #fcd34d;}
.urg-neutral{background:#fefce8;color:#713f12;border:1px solid #fde68a;}
.urg-pass{background:#f0fdf4;color:#14532d;border:1px solid #86efac;}
.urg-empty{background:var(--bg2);color:var(--tx2);border:1px solid var(--bd);}
@keyframes pulse-attack{
  0%{box-shadow:0 0 0 0 rgba(239,68,68,0.5);}
  60%{box-shadow:0 0 0 6px rgba(239,68,68,0);}
  100%{box-shadow:0 0 0 0 rgba(239,68,68,0);}
}
@media(prefers-color-scheme:dark){
  .urg-attack{background:#dc2626;color:#fff;border-color:#b91c1c;box-shadow:0 0 0 0 rgba(220,38,38,0.6);animation:pulse-attack-dark 1.6s ease-in-out infinite;}
  .urg-watch{background:#431407;color:#fcd34d;border-color:#92400e;}
  .urg-neutral{background:#422006;color:#fde68a;border-color:#713f12;}
  .urg-pass{background:#052e16;color:#86efac;border-color:#14532d;}
  .urg-empty{background:var(--bg2);color:var(--tx2);border-color:var(--bd);}
}
@keyframes pulse-attack-dark{
  0%{box-shadow:0 0 0 0 rgba(220,38,38,0.6);}
  60%{box-shadow:0 0 0 6px rgba(220,38,38,0);}
  100%{box-shadow:0 0 0 0 rgba(220,38,38,0);}
}

.slot-body{padding:14px 16px;flex:1;}

/* Metrics row */
.metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px;}
.metric{background:var(--bg2);border-radius:var(--r);padding:8px 10px;}
.metric-lbl{font-size:10px;color:var(--tx2);margin-bottom:2px;}
.metric-val{font-size:16px;font-weight:500;}
.metric-val.pos{color:var(--ok);}
.metric-val.neg{color:var(--bad);}
.metric-val.warn{color:var(--warn);}

/* EV ratio bar */
.ev-section{margin-bottom:12px;}
.ev-label-row{display:flex;justify-content:space-between;font-size:11px;color:var(--tx2);margin-bottom:4px;}
.ev-bar-bg{height:8px;background:var(--bg2);border-radius:4px;overflow:hidden;}
.ev-bar-fill{height:8px;border-radius:4px;transition:width 0.4s;}

/* Degradation row */
.deg-section{margin-bottom:12px;}
.deg-title{font-size:11px;color:var(--tx2);margin-bottom:6px;font-weight:500;}
.deg-row{display:flex;gap:6px;margin-bottom:4px;font-size:11px;align-items:center;}
.deg-lbl{color:var(--tx2);width:90px;flex-shrink:0;}
.deg-bar-bg{flex:1;height:5px;background:var(--bg2);border-radius:3px;}
.deg-bar-fill{height:5px;border-radius:3px;}
.deg-val{color:var(--tx2);min-width:40px;text-align:right;}

/* Pulled / remaining pills */
.tier-summary{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;}
.ts-pill{font-size:10px;padding:3px 8px;border-radius:999px;font-weight:500;}
.ts-grail{background:#FAEEDA;color:#633806;}
.ts-chase{background:#E6F1FB;color:#0C447C;}
.ts-base{background:#F1EFE8;color:#444441;}
.ts-pulled{background:var(--bg2);color:var(--tx2);text-decoration:line-through;}
@media(prefers-color-scheme:dark){
  .ts-grail{background:#412402;color:#FAC775;}
  .ts-chase{background:#042C53;color:#85B7EB;}
  .ts-base{background:#2C2C2A;color:#B4B2A9;}
}

/* Snapshot controls */
.slot-footer{padding:10px 16px;border-top:0.5px solid var(--bd);display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
button{background:var(--bg);border:0.5px solid var(--bd2);border-radius:var(--r);padding:5px 12px;font-size:12px;color:var(--tx);cursor:pointer;font-family:var(--f);}
button:hover{background:var(--bg2);}
button:active{transform:scale(0.98);}
.btn-primary{background:var(--info);color:#fff;border-color:var(--info);}
.btn-primary:hover{opacity:0.9;}
.btn-danger{color:var(--bad);border-color:var(--bad);}
.slot-time{font-size:10px;color:var(--tx2);margin-left:auto;}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:100;padding:1rem;}
.modal{background:var(--bg);border-radius:var(--rl);padding:20px 24px;width:100%;max-width:520px;display:flex;flex-direction:column;gap:12px;}
.modal h2{font-size:16px;font-weight:500;}
.modal-sub{font-size:12px;color:var(--tx2);}
textarea{width:100%;height:180px;font-size:11px;font-family:var(--fm);resize:vertical;border:0.5px solid var(--bd2);border-radius:var(--r);padding:8px;background:var(--bg);color:var(--tx);outline:none;}
textarea:focus{box-shadow:0 0 0 2px var(--info);}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;}
.hint{font-size:11px;color:var(--tx2);line-height:1.5;}

/* Empty state */
.empty-state{padding:20px 0;text-align:center;color:var(--tx2);font-size:12px;}

/* Diff section */
.diff-section{margin-bottom:10px;}
.diff-title{font-size:11px;font-weight:500;color:var(--tx2);margin-bottom:5px;}
.diff-item{font-size:11px;padding:3px 0;border-bottom:0.5px solid var(--bd);color:var(--tx);display:flex;justify-content:space-between;gap:8px;}
.diff-item:last-child{border-bottom:none;}
.diff-item-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;}
.diff-item-val{color:var(--tx2);white-space:nowrap;flex-shrink:0;}
.pulled-tag{font-size:9px;padding:1px 5px;border-radius:3px;background:var(--bad);color:#fff;margin-left:4px;}

/* Urgency score bar */
.urg-score-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.urg-score-bg{flex:1;height:10px;background:var(--bg2);border-radius:5px;overflow:hidden;}
.urg-score-fill{height:10px;border-radius:5px;}
.urg-score-num{font-size:13px;font-weight:500;min-width:36px;text-align:right;}

/* Breakeven section */
.bk-section{margin-bottom:12px;border:0.5px solid var(--bd);border-radius:var(--r);overflow:hidden;}
.bk-title{font-size:11px;font-weight:500;color:var(--tx2);padding:7px 10px;background:var(--bg2);border-bottom:0.5px solid var(--bd);}
.bk-grid{display:grid;grid-template-columns:repeat(3,1fr);}
.bk-cell{padding:8px 10px;border-right:0.5px solid var(--bd);}
.bk-cell:last-child{border-right:none;}
.bk-lbl{font-size:9px;color:var(--tx2);margin-bottom:3px;line-height:1.3;}
.bk-num{font-size:15px;font-weight:500;}
.bk-num.good{color:var(--ok);}
.bk-num.warn{color:#f59e0b;}
.bk-num.bad{color:var(--bad);}
.bk-sub{font-size:9px;color:var(--tx2);margin-top:2px;}
.bk-skew{font-size:10px;color:#f59e0b;padding:5px 10px;background:#fff7ed;border-top:0.5px solid #fcd34d;}
@media(prefers-color-scheme:dark){.bk-skew{background:#431407;border-color:#92400e;color:#fcd34d;}}

.search-bar{display:flex;gap:10px;align-items:center;margin-bottom:1.5rem;background:var(--bg);border:0.5px solid var(--bd);border-radius:var(--rl);padding:12px 16px;}
.search-bar input{flex:1;font-size:14px;border:none;outline:none;background:transparent;color:var(--tx);}
.search-bar input::placeholder{color:var(--tx2);}
.search-icon{color:var(--tx2);font-size:16px;flex-shrink:0;}
.search-results{background:var(--bg);border:0.5px solid var(--bd);border-radius:var(--rl);margin-bottom:1.5rem;overflow:hidden;}
.sr-header{padding:10px 16px;background:var(--bg2);border-bottom:0.5px solid var(--bd);font-size:12px;color:var(--tx2);display:flex;justify-content:space-between;align-items:center;}
.sr-row{display:flex;align-items:center;gap:10px;padding:8px 16px;border-bottom:0.5px solid var(--bd);font-size:12px;}
.sr-row:last-child{border-bottom:none;}
.sr-row:hover{background:var(--bg2);}
.sr-name{flex:1;color:var(--tx);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.sr-pack{font-size:11px;color:var(--tx2);white-space:nowrap;}
.sr-val{font-size:12px;font-weight:500;white-space:nowrap;}
.sr-tier{display:inline-block;font-size:10px;padding:2px 6px;border-radius:4px;font-weight:500;white-space:nowrap;}
.sr-status-pulled{font-size:10px;color:var(--bad);white-space:nowrap;}
.sr-status-live{font-size:10px;color:var(--ok);white-space:nowrap;}
.sr-empty{padding:16px;text-align:center;color:var(--tx2);font-size:13px;}
</head>
<body>
<div class="wrap">
  <h1>Instant Rips — Attack Dashboard</h1>
  <p class="sub">Track checklist degradation across all price tiers. Paste an updated checklist into any slot to compare against the previous snapshot and get an urgency score.</p>

  <div class="search-bar">
    <span class="search-icon">🔍</span>
    <input type="text" id="global-search" placeholder="Search for a player across all packs..." oninput="runSearch()" autocomplete="off" />
    <button onclick="clearSearch()" id="search-clear" style="display:none;font-size:12px;padding:4px 10px;">Clear</button>
  </div>

  <div id="search-results" style="display:none;"></div>

  <div class="dashboard" id="dashboard"></div>
</div>

<!-- Paste Modal -->
<div class="modal-overlay" id="modal" style="display:none;">
  <div class="modal">
    <h2 id="modal-title">Paste checklist</h2>
    <p class="modal-sub" id="modal-sub">Paste the current Fanatics checklist for this pack. Each new paste is compared against the previous one.</p>
    <textarea id="modal-ta" placeholder="Card Name&#10;Card Ladder Value $838.00&#10;Grail&#10;&#10;Another Card&#10;Card Ladder Value $280.00&#10;Chase"></textarea>
    <p class="hint" id="modal-hint"></p>
    <div class="modal-btns">
      <button onclick="closeModal()">Cancel</button>
      <button class="btn-primary" onclick="submitPaste()">Apply snapshot</button>
    </div>
  </div>
</div>

<script>
var TIERS = [
  {price:75,   label:"Baseball $75",    custom:false},
  {price:"custom", label:"Custom Pack", custom:true},
  {price:150,  label:"Baseball $150",   custom:false},
  {price:250,  label:"Baseball $250",   custom:false},
  {price:500,  label:"Baseball $500",   custom:false},
  {price:1000, label:"Baseball $1,000", custom:false}
];

// State: each slot has snapshots array (max 2: [original, current])
var state = {};
TIERS.forEach(function(t){ state[t.price] = {snapshots:[], lastUpdated:null, customPrice:null}; });

var activeModal = null; // price tier currently being edited

// ── Parser ────────────────────────────────────────────────────────────────────
function parsePaste(raw) {
  var lines = raw.replace(/\r\n/g,"\n").replace(/\r/g,"\n").split("\n");
  for (var i=0;i<lines.length;i++) lines[i]=lines[i].trim();
  var result=[];
  for (var i=0;i<lines.length;i++){
    var line=lines[i];
    if(!line) continue;
    var vm=line.match(/Card Ladder Value \$?([\d,]+(?:\.\d+)?)/i);
    if(!vm) continue;
    var val=parseFloat(vm[1].replace(/,/g,""));
    var name="", tier="Base";
    for(var b=i-1;b>=Math.max(0,i-8);b--){
      var bl=lines[b];
      if(!bl) continue;
      if(/Card Ladder/i.test(bl)) break;
      if(/^(Grail|Chase|Base)$/i.test(bl)) continue;
      name=bl; break;
    }
    for(var f=i+1;f<=Math.min(lines.length-1,i+5);f++){
      var fl=lines[f];
      if(!fl) continue;
      if(/^(Grail|Chase|Base)$/i.test(fl)){tier=fl.charAt(0).toUpperCase()+fl.slice(1).toLowerCase();break;}
      if(/Card Ladder/i.test(fl)) break;
    }
    if(name) result.push({name:name,val:val,tier:tier});
  }
  return result;
}

// ── Analytics ─────────────────────────────────────────────────────────────────
function poolStats(cards) {
  if (!cards || !cards.length) return null;
  var ng=0,nc=0,nb=0,total=cards.length,sumVal=0;
  cards.forEach(function(c){
    sumVal+=c.val;
    if(c.tier==="Grail") ng++;
    else if(c.tier==="Chase") nc++;
    else nb++;
  });
  var avg=sumVal/total;
  return{total:total,ng:ng,nc:nc,nb:nb,hits:ng+nc,hitRate:(ng+nc)/total,avg:avg,sumVal:sumVal};
}

function baseStats(cards) {
  if (!cards || !cards.length) return null;
  var arr = cards.filter(function(c){ return c.tier==="Base"; }).map(function(c){ return c.val; });
  if (!arr.length) return null;
  arr.sort(function(a,b){ return a-b; });
  var avg = arr.reduce(function(s,v){ return s+v; },0) / arr.length;
  var mid = arr.length % 2 === 0
    ? (arr[arr.length/2-1] + arr[arr.length/2]) / 2
    : arr[Math.floor(arr.length/2)];
  var below = arr.filter(function(v){ return v < avg; }).length;
  return {
    count: arr.length,
    avg:   avg,
    median: mid,
    min:   arr[0],
    max:   arr[arr.length-1],
    below: below,
    above: arr.length - below
  };
}

function diffSnapshots(orig, curr) {
  // Find cards in orig but not in curr (pulled cards) — match by name
  var currNames = {};
  curr.forEach(function(c){ currNames[c.name.toLowerCase()] = true; });
  var pulled = orig.filter(function(c){ return !currNames[c.name.toLowerCase()]; });
  return pulled;
}

// ── Urgency Score (0-100) ─────────────────────────────────────────────────────
// Factors:
// 1. EV Ratio      (30pts): remaining avg / pack price
// 2. Hit survival  (20pts): % of original hits still in pool
// 3. Grail present (20pts): any grail still remaining?
// 4. Extraction    (15pts): sweet-spot degradation (25-60% extracted)
// 5. Pull velocity (15pts): how fast cards are being pulled — bonus when
//                           the window is closing fast but hits still remain
function calcUrgency(price, origStats, currStats, pulled, origSnap, currSnap) {
  if (!origStats || !currStats) return null;

  // F1: EV ratio vs pack price
  var evRatio = currStats.avg / price;
  var f1 = Math.min(evRatio / 1.5, 1);

  // F2: Hit survival rate
  var origHits = origStats.hits;
  var currHits = currStats.hits;
  var f2 = origHits > 0 ? currHits / origHits : 0;

  // F3: Grail presence
  var f3 = currStats.ng > 0 ? 1 : 0;

  // F4: Extraction rate sweet spot
  var pulledVal = pulled.reduce(function(s,c){return s+c.val;},0);
  var extractionRate = origStats.sumVal > 0 ? pulledVal / origStats.sumVal : 0;
  var f4 = extractionRate < 0.1  ? 0.2 :
           extractionRate < 0.25 ? 0.5 :
           extractionRate < 0.6  ? 1.0 :
           extractionRate < 0.8  ? 0.6 : 0.1;

  // F5: Pull velocity — cards pulled per hour, normalised against pool size
  var pullRate = 0;        // cards/hour
  var hoursElapsed = 0;
  var estHoursLeft = null;
  var velocityLabel = "";

  if (origSnap && currSnap && origSnap.ts && currSnap.ts && origSnap.ts !== currSnap.ts) {
    hoursElapsed = (currSnap.ts - origSnap.ts) / 3600000; // ms → hours
    if (hoursElapsed > 0) {
      pullRate = pulled.length / hoursElapsed;
      // Remaining cards at current velocity
      var remaining = currStats.total;
      if (pullRate > 0) {
        estHoursLeft = remaining / pullRate;
      }
    }
  }

  // Normalise velocity: 0 = no data or very slow, 1 = very fast
  // Reference: pulling 20% of remaining pool per hour = urgent
  var velocityRatio = origStats.total > 0 ? pullRate / (origStats.total * 0.2) : 0;
  // Only boost score if hits still remain (velocity is irrelevant if pool is stripped)
  var f5 = currHits > 0 ? Math.min(velocityRatio, 1) : 0;
  if (pullRate > 0 && estHoursLeft !== null) {
    if (estHoursLeft < 0.5)      velocityLabel = "Very fast — less than 30 min left";
    else if (estHoursLeft < 1)   velocityLabel = "Fast — under 1 hr remaining";
    else if (estHoursLeft < 3)   velocityLabel = "Moderate — ~"+Math.round(estHoursLeft)+" hrs left";
    else                         velocityLabel = "Slow — ~"+Math.round(estHoursLeft)+" hrs left";
  }

  var raw = (f1*30) + (f2*20) + (f3*20) + (f4*15) + (f5*15);
  var score = Math.min(100, Math.round(raw));

  var level, cls, label;
  if (score >= 80) { level="attack"; cls="urg-attack"; label="Attack Now"; }
  else if (score >= 65) { level="watch";  cls="urg-watch";  label="Watch"; }
  else if (score >= 40) { level="neutral";cls="urg-neutral";label="Neutral"; }
  else                  { level="pass";   cls="urg-pass";   label="Pass"; }

  return {score:score, level:level, cls:cls, label:label,
          evRatio:evRatio, f1:f1, f2:f2, f3:f3, f4:f4, f5:f5,
          extractionRate:extractionRate,
          pullRate:pullRate, hoursElapsed:hoursElapsed,
          estHoursLeft:estHoursLeft, velocityLabel:velocityLabel};
}

// ── Breakeven Pull Calculations ───────────────────────────────────────────────
// Three distinct numbers that answer "how many pulls to realize EV?"
function calcBreakeven(price, cards) {
  if (!cards || !cards.length) return null;

  var vals = cards.map(function(c){return c.val;}).sort(function(a,b){return a-b;});
  var n = vals.length;
  var avg = vals.reduce(function(s,v){return s+v;},0) / n;

  // 1. Avg-based breakeven: pulls until cumulative avg >= total spent
  //    Each pull costs $price, expected return = avg. Breakeven = price/avg.
  var avgBreakeven = avg > 0 ? price / avg : null;

  // 2. Median-based breakeven: more realistic — most pulls land near median
  var median = n % 2 === 0
    ? (vals[n/2-1] + vals[n/2]) / 2
    : vals[Math.floor(n/2)];
  var medBreakeven = median > 0 ? price / median : null;

  // 3. Pulls for 50% hit chance: geometric distribution
  //    P(at least 1 hit in k pulls) = 1 - (1-p)^k >= 0.5
  //    k = log(0.5) / log(1-p)
  var hits = cards.filter(function(c){return c.tier==="Grail"||c.tier==="Chase";}).length;
  var hitRate = hits / n;
  var pullsFor50 = hitRate > 0
    ? Math.ceil(Math.log(0.5) / Math.log(1 - hitRate))
    : null;

  // 4. Cost to 50% hit chance
  var costFor50 = pullsFor50 ? pullsFor50 * price : null;

  // Signal: is avg < median? (skew warning — mean is being pulled up by outliers)
  var skewed = avg > median * 1.5;

  return {
    avgBreakeven: avgBreakeven,
    medBreakeven: medBreakeven,
    pullsFor50:   pullsFor50,
    costFor50:    costFor50,
    avg:          avg,
    median:       median,
    hitRate:      hitRate,
    skewed:       skewed
  };
}
function dollar(n) {
  if (!n && n!==0) return "—";
  return "$"+Number(n).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2});
}
function pct(n) { return (n*100).toFixed(1)+"%"; }
function timeStr() {
  var d=new Date();
  return d.toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"});
}

// ── Global Search ─────────────────────────────────────────────────────────────
function runSearch() {
  var q = document.getElementById('global-search').value.trim().toLowerCase();
  var clearBtn = document.getElementById('search-clear');
  var resultsDiv = document.getElementById('search-results');

  if (!q) { clearSearch(); return; }
  clearBtn.style.display = '';

  // Search across all slots — current snapshot if available, else original
  var hits = [];
  TIERS.forEach(function(tier) {
    var s = state[tier.price];
    var snaps = s.snapshots;
    if (!snaps.length) return;

    var origCards = snaps[0].cards;
    var currCards = snaps.length >= 2 ? snaps[1].cards : snaps[0].cards;
    var effectivePrice = tier.custom ? s.customPrice : tier.price;
    var label = tier.custom && s.customPrice ? 'Custom $'+s.customPrice : tier.label;

    // Build pulled set
    var currNames = {};
    currCards.forEach(function(c){ currNames[c.name.toLowerCase()] = true; });

    // Search current remaining cards
    currCards.forEach(function(c) {
      if (c.name.toLowerCase().indexOf(q) !== -1) {
        hits.push({name:c.name, val:c.val, tier:c.tier, pack:label,
                   price:effectivePrice, pulled:false});
      }
    });

    // Also search pulled cards if 2 snapshots exist
    if (snaps.length >= 2) {
      origCards.forEach(function(c) {
        if (!currNames[c.name.toLowerCase()] && c.name.toLowerCase().indexOf(q) !== -1) {
          hits.push({name:c.name, val:c.val, tier:c.tier, pack:label,
                     price:effectivePrice, pulled:true});
        }
      });
    }
  });

  // Sort: live cards first, then by value desc
  hits.sort(function(a,b){
    if (a.pulled !== b.pulled) return a.pulled ? 1 : -1;
    return b.val - a.val;
  });

  if (!hits.length) {
    resultsDiv.innerHTML = "<div class='search-results'><div class='sr-empty'>No cards found matching \""+q+"\" across any loaded pack.</div></div>";
    resultsDiv.style.display = '';
    return;
  }

  var liveCount = hits.filter(function(h){ return !h.pulled; }).length;
  var pulledCount = hits.length - liveCount;

  var html = "<div class='search-results'>";
  html += "<div class='sr-header'><span>"+hits.length+" results for \""+q+"\"</span>";
  html += "<span>"+liveCount+" still available &nbsp;·&nbsp; "+pulledCount+" pulled</span></div>";

  hits.forEach(function(h) {
    var bc = h.tier==="Grail"?"bdgg":h.tier==="Chase"?"bdgc":"bdgb";
    var statusHtml = h.pulled
      ? "<span class='sr-status-pulled'>Pulled</span>"
      : "<span class='sr-status-live'>Available</span>";
    html += "<div class='sr-row"+(h.pulled?" sr-row-pulled":"")+"' style='"+(h.pulled?"opacity:0.55;":"")+"'>";
    html += "<span class='sr-name' title='"+h.name+"'>"+h.name+"</span>";
    html += "<span class='sr-pack'>"+h.pack+"</span>";
    html += "<span class='sr-tier badge "+bc+"'>"+h.tier+"</span>";
    html += "<span class='sr-val'>"+dollar(h.val)+"</span>";
    html += statusHtml;
    html += "</div>";
  });
  html += "</div>";

  resultsDiv.innerHTML = html;
  resultsDiv.style.display = '';
}

function clearSearch() {
  document.getElementById('global-search').value = '';
  document.getElementById('search-clear').style.display = 'none';
  document.getElementById('search-results').style.display = 'none';
  document.getElementById('search-results').innerHTML = '';
}

// ── Render ─────────────────────────────────────────────────────────────────────
function renderAll() {
  var dash = document.getElementById("dashboard");
  var html = "";
  TIERS.forEach(function(t) {
    html += renderSlot(t);
  });
  dash.innerHTML = html;
}

function renderSlot(tier) {
  var s = state[tier.price];
  var snaps = s.snapshots;
  var hasOrig = snaps.length >= 1;
  var hasCurr = snaps.length >= 2;

  // For custom slot, use the stored custom price
  var effectivePrice = tier.custom ? s.customPrice : tier.price;
  var hasCustomPrice = tier.custom && s.customPrice !== null;

  var orig = hasOrig ? snaps[0] : null;
  var curr = hasCurr ? snaps[1] : (hasOrig ? snaps[0] : null);
  var origStats = orig ? poolStats(orig.cards) : null;
  var currStats = curr ? poolStats(curr.cards) : null;
  var pulled = (hasOrig && hasCurr) ? diffSnapshots(orig.cards, curr.cards) : [];
  var urg = (origStats && currStats && effectivePrice && pulled.length >= 0)
    ? calcUrgency(effectivePrice, origStats, currStats, pulled, orig, curr)
    : null;

  var urgBadge = urg
    ? "<span class='urgency-badge "+urg.cls+"'>"+urg.label+"</span>"
    : "<span class='urgency-badge urg-empty'>No data</span>";

  // Header
  var out = "<div class='slot' id='slot-"+tier.price+"'>";
  out += "<div class='slot-header'>";

  if (tier.custom) {
    // Custom slot header — show price input if not set, else show price
    if (hasCustomPrice) {
      out += "<div><div class='slot-price'>"+dollar(effectivePrice)+"</div>";
      out += "<div class='slot-label'>Custom pack <button style='font-size:10px;padding:2px 6px;margin-left:4px;' onclick='resetCustomPrice()'>Change price</button></div></div>";
    } else {
      out += "<div style='flex:1;'>";
      out += "<div class='slot-label' style='margin-bottom:5px;'>Custom pack — enter price to begin</div>";
      out += "<div style='display:flex;gap:6px;align-items:center;'>";
      out += "<span style='font-size:13px;color:var(--tx2);'>$</span>";
      out += "<input type='number' id='custom-price-input' min='1' step='1' placeholder='e.g. 125' style='width:100px;font-size:14px;font-weight:500;' onkeydown='if(event.key===\"Enter\") setCustomPrice()' />";
      out += "<button class='btn-primary' onclick='setCustomPrice()'>Set price</button>";
      out += "</div></div>";
    }
  } else {
    out += "<div><div class='slot-price'>"+dollar(tier.price)+"</div><div class='slot-label'>"+tier.label+"</div></div>";
  }

  out += urgBadge;
  out += "</div>";

  out += "<div class='slot-body'>";

  // Custom slot with no price yet — show prompt only
  if (tier.custom && !hasCustomPrice) {
    out += "<div class='empty-state'>Set a pack price above to start tracking.</div>";
    out += "</div>";
    out += "<div class='slot-footer'></div>";
    out += "</div>";
    return out;
  }

  if (!hasOrig) {
    out += "<div class='empty-state'>No checklist loaded.<br>Paste the original checklist to start tracking.</div>";
  } else {
    // Urgency score bar + definition
    if (urg) {
      var urgColor = urg.level==="attack"?"#ef4444":urg.level==="watch"?"#f59e0b":urg.level==="neutral"?"#eab308":"#22c55e";
      out += "<div class='urg-score-row'>";
      out += "<div style='font-size:10px;color:var(--tx2);width:90px;flex-shrink:0;'>Urgency score</div>";
      out += "<div class='urg-score-bg'><div class='urg-score-fill' style='width:"+urg.score+"%;background:"+urgColor+";'></div></div>";
      out += "<div class='urg-score-num' style='color:"+urgColor+";'>"+urg.score+"</div>";
      out += "</div>";

      // Score definition
      var defText = urg.level === "attack"
        ? "Rare buy signal (80+) — EV is well above pack price, hits are still in the pool, extraction is in the sweet spot, and pull velocity confirms the window is closing. Act now."
        : urg.level === "watch"
        ? "Conditions are favorable but not urgent — decent EV ratio and some hits remain. Paste an updated snapshot to see if velocity is accelerating."
        : urg.level === "neutral"
        ? "Pool is near break-even. Either too early (pool still full) or value has largely been extracted. No strong signal in either direction."
        : "Pool has degraded significantly. EV is below or near pack price and most hits have been pulled. Not recommended.";

      out += "<div style='font-size:10px;color:var(--tx2);line-height:1.5;margin-bottom:10px;padding:6px 8px;background:var(--bg2);border-radius:var(--r);border-left:2px solid "+urgColor+";'>";
      out += "<strong style='color:"+urgColor+";'>"+urg.label+"</strong> — "+defText;
      out += "</div>";
    }

    // Key metrics
    if (currStats) {
      var evCls = currStats.avg >= effectivePrice*1.2 ? "pos" : currStats.avg >= effectivePrice ? "warn" : "neg";
      out += "<div class='metrics'>";
      out += "<div class='metric'><div class='metric-lbl'>Remaining cards</div><div class='metric-val'>"+currStats.total+(origStats&&origStats.total!==currStats.total?" <span style='font-size:10px;color:var(--bad);'>-"+(origStats.total-currStats.total)+"</span>":"")+"</div></div>";
      out += "<div class='metric'><div class='metric-lbl'>Avg remaining value</div><div class='metric-val "+evCls+"'>"+dollar(currStats.avg)+"</div></div>";
      out += "<div class='metric'><div class='metric-lbl'>Hit rate</div><div class='metric-val'>"+pct(currStats.hitRate)+"</div></div>";
      out += "</div>";
    }

    // Base card avg stats
    if (curr) {
      var bs = baseStats(curr.cards);
      var bsOrig = orig ? baseStats(orig.cards) : null;
      if (bs) {
        // Delta vs original base avg
        var deltaHtml = "";
        if (bsOrig && bsOrig.avg !== bs.avg) {
          var delta = bs.avg - bsOrig.avg;
          var dSign = delta >= 0 ? "+" : "";
          var dCol = delta >= 0 ? "var(--ok)" : "var(--bad)";
          deltaHtml = " <span style='font-size:10px;color:"+dCol+";'>"+dSign+dollar(delta)+" vs original</span>";
        }
        out += "<div style='background:var(--bg2);border-radius:var(--r);padding:10px 12px;margin-bottom:12px;'>";
        out += "<div style='font-size:10px;color:var(--tx2);margin-bottom:6px;font-weight:500;'>Base card stats</div>";
        out += "<div style='display:grid;grid-template-columns:repeat(4,1fr);gap:6px;'>";
        out += "<div><div style='font-size:9px;color:var(--tx2);'>Avg</div><div style='font-size:14px;font-weight:500;'>"+dollar(bs.avg)+deltaHtml+"</div></div>";
        out += "<div><div style='font-size:9px;color:var(--tx2);'>Median</div><div style='font-size:14px;font-weight:500;'>"+dollar(bs.median)+"</div></div>";
        out += "<div><div style='font-size:9px;color:var(--tx2);'>Low</div><div style='font-size:14px;font-weight:500;'>"+dollar(bs.min)+"</div></div>";
        out += "<div><div style='font-size:9px;color:var(--tx2);'>High</div><div style='font-size:14px;font-weight:500;'>"+dollar(bs.max)+"</div></div>";
        out += "</div>";
        out += "<div style='font-size:10px;color:var(--tx2);margin-top:5px;'>"+bs.below+" of "+bs.count+" base cards below avg</div>";
        out += "</div>";
      }
    }

    // EV vs pack price bar
    if (urg) {
      var evPct = Math.min(urg.evRatio / 2, 1) * 100;
      var evColor = urg.evRatio >= 1.5 ? "#22c55e" : urg.evRatio >= 1.0 ? "#eab308" : "#ef4444";
      out += "<div class='ev-section'>";
      out += "<div class='ev-label-row'><span>EV vs pack price</span><span style='color:"+evColor+";font-weight:500;'>"+urg.evRatio.toFixed(2)+"x</span></div>";
      out += "<div class='ev-bar-bg'><div class='ev-bar-fill' style='width:"+evPct+"%;background:"+evColor+";'></div></div>";
      out += "</div>";
    }

    // Breakeven pull counts
    if (curr && effectivePrice) {
      var bk = calcBreakeven(effectivePrice, curr.cards);
      if (bk) {
        var avgBkCls = bk.avgBreakeven <= 1.5 ? "good" : bk.avgBreakeven <= 3 ? "warn" : "bad";
        var medBkCls = bk.medBreakeven <= 2 ? "good" : bk.medBreakeven <= 4 ? "warn" : "bad";
        var hitCostCls = bk.costFor50 && bk.costFor50 <= effectivePrice * 3 ? "good"
                       : bk.costFor50 && bk.costFor50 <= effectivePrice * 6 ? "warn" : "bad";

        out += "<div class='bk-section'>";
        out += "<div class='bk-title'>Pulls to realize EV</div>";
        out += "<div class='bk-grid'>";

        // Cell 1: Avg-based breakeven
        out += "<div class='bk-cell'>";
        out += "<div class='bk-lbl'>Avg-based breakeven</div>";
        out += "<div class='bk-num "+avgBkCls+"'>"+(bk.avgBreakeven ? bk.avgBreakeven.toFixed(1)+" pulls" : "—")+"</div>";
        out += "<div class='bk-sub'>avg pull "+dollar(bk.avg)+"</div>";
        out += "</div>";

        // Cell 2: Median-based breakeven
        out += "<div class='bk-cell'>";
        out += "<div class='bk-lbl'>Median-based breakeven</div>";
        out += "<div class='bk-num "+medBkCls+"'>"+(bk.medBreakeven ? bk.medBreakeven.toFixed(1)+" pulls" : "—")+"</div>";
        out += "<div class='bk-sub'>median pull "+dollar(bk.median)+"</div>";
        out += "</div>";

        // Cell 3: Pulls for 50% hit
        out += "<div class='bk-cell'>";
        out += "<div class='bk-lbl'>Pulls for 50% hit chance</div>";
        out += "<div class='bk-num "+hitCostCls+"'>"+(bk.pullsFor50 ? bk.pullsFor50+" pulls" : "—")+"</div>";
        out += "<div class='bk-sub'>"+(bk.costFor50 ? dollar(bk.costFor50)+" total" : "no hits left")+"</div>";
        out += "</div>";

        out += "</div>"; // end bk-grid

        // Skew warning
        if (bk.skewed) {
          out += "<div class='bk-skew'>⚠ Mean is 1.5x+ above median — avg is skewed by a few high-value cards. The median breakeven is the more realistic number.</div>";
        }

        out += "</div>"; // end bk-section
      }
    }

    // Tier survival
    if (origStats && currStats) {
      out += "<div class='deg-section'>";
      out += "<div class='deg-title'>Tier survival</div>";
      // Grails
      if (origStats.ng > 0) {
        var gPct = currStats.ng / origStats.ng;
        var gColor = gPct === 1 ? "#22c55e" : gPct > 0.5 ? "#f59e0b" : "#ef4444";
        out += "<div class='deg-row'><span class='deg-lbl'>Grails</span>";
        out += "<div class='deg-bar-bg'><div class='deg-bar-fill' style='width:"+(gPct*100)+"%;background:"+gColor+";'></div></div>";
        out += "<span class='deg-val'>"+currStats.ng+"/"+origStats.ng+"</span></div>";
      }
      // Chases
      if (origStats.nc > 0) {
        var cPct = currStats.nc / origStats.nc;
        var cColor = cPct === 1 ? "#22c55e" : cPct > 0.5 ? "#f59e0b" : "#ef4444";
        out += "<div class='deg-row'><span class='deg-lbl'>Chases</span>";
        out += "<div class='deg-bar-bg'><div class='deg-bar-fill' style='width:"+(cPct*100)+"%;background:"+cColor+";'></div></div>";
        out += "<span class='deg-val'>"+currStats.nc+"/"+origStats.nc+"</span></div>";
      }
      // Base
      if (origStats.nb > 0) {
        var bPct = currStats.nb / origStats.nb;
        out += "<div class='deg-row'><span class='deg-lbl'>Base</span>";
        out += "<div class='deg-bar-bg'><div class='deg-bar-fill' style='width:"+(bPct*100)+"%;background:#888780;'></div></div>";
        out += "<span class='deg-val'>"+currStats.nb+"/"+origStats.nb+"</span></div>";
      }
      out += "</div>";
    }

    // Urgency breakdown
    if (urg) {
      out += "<div class='deg-section'>";
      out += "<div class='deg-title'>Score breakdown</div>";
      var factors = [
        {lbl:"EV ratio",        val:Math.round(urg.f1*30), max:30},
        {lbl:"Hit survival",    val:Math.round(urg.f2*20), max:20},
        {lbl:"Grail present",   val:Math.round(urg.f3*20), max:20},
        {lbl:"Extraction rate", val:Math.round(urg.f4*15), max:15},
        {lbl:"Pull velocity",   val:Math.round(urg.f5*15), max:15}
      ];
      factors.forEach(function(f){
        var fp = Math.round((f.val/f.max)*100);
        out += "<div class='deg-row'><span class='deg-lbl'>"+f.lbl+"</span>";
        out += "<div class='deg-bar-bg'><div class='deg-bar-fill' style='width:"+fp+"%;background:var(--info);'></div></div>";
        out += "<span class='deg-val'>"+f.val+"/"+f.max+"</span></div>";
      });

      // Pull velocity stats row
      if (urg.pullRate > 0) {
        out += "<div style='margin-top:8px;padding-top:8px;border-top:0.5px solid var(--bd);display:grid;grid-template-columns:repeat(3,1fr);gap:6px;'>";
        out += "<div><div style='font-size:9px;color:var(--tx2);'>Pull rate</div><div style='font-size:13px;font-weight:500;'>"+urg.pullRate.toFixed(1)+"/hr</div></div>";
        out += "<div><div style='font-size:9px;color:var(--tx2);'>Elapsed</div><div style='font-size:13px;font-weight:500;'>"+urg.hoursElapsed.toFixed(1)+"h</div></div>";
        var timeLeftColor = urg.estHoursLeft!==null&&urg.estHoursLeft<1 ? "var(--bad)" : urg.estHoursLeft!==null&&urg.estHoursLeft<3 ? "#f59e0b" : "var(--tx)";
        var timeLeftVal = urg.estHoursLeft!==null ? urg.estHoursLeft.toFixed(1)+"h" : "—";
        out += "<div><div style='font-size:9px;color:var(--tx2);'>Est. time left</div><div style='font-size:13px;font-weight:500;color:"+timeLeftColor+";'>"+timeLeftVal+"</div></div>";
        out += "</div>";
        if (urg.velocityLabel) {
          out += "<div style='font-size:10px;color:var(--tx2);margin-top:4px;'>"+urg.velocityLabel+"</div>";
        }
      } else if (urg.f5 === 0) {
        out += "<div style='font-size:10px;color:var(--tx2);margin-top:6px;'>Velocity: paste a second snapshot to enable pull rate tracking.</div>";
      }

      out += "</div>";
    }

    // Recently pulled cards — scrollable full list
    if (pulled.length > 0) {
      out += "<div class='diff-section'>";
      out += "<div style='display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;'>";
      out += "<div class='diff-title'>Pulled cards ("+pulled.length+" total)</div>";
      // Tier counts for pulled
      var pgn=0,pcn=0,pbn=0;
      pulled.forEach(function(c){if(c.tier==="Grail")pgn++;else if(c.tier==="Chase")pcn++;else pbn++;});
      out += "<div style='font-size:10px;color:var(--tx2);display:flex;gap:6px;'>";
      if(pgn>0) out += "<span style='color:#BA7517;'>"+pgn+" Grail</span>";
      if(pcn>0) out += "<span style='color:var(--info);'>"+pcn+" Chase</span>";
      if(pbn>0) out += "<span>"+pbn+" Base</span>";
      out += "</div>";
      out += "</div>";
      out += "<div style='max-height:160px;overflow-y:auto;border:0.5px solid var(--bd);border-radius:var(--r);'>";
      pulled.forEach(function(c){
        var bc = c.tier==="Grail"?"ts-grail":c.tier==="Chase"?"ts-chase":"ts-base";
        out += "<div class='diff-item'>";
        out += "<span class='diff-item-name' title='"+c.name+"'>"+c.name+"</span>";
        out += "<span class='diff-item-val'><span class='ts-pill "+bc+"'>"+c.tier+"</span> "+dollar(c.val)+"</span>";
        out += "</div>";
      });
      out += "</div>";
      out += "</div>";
    }

    // Snapshot timestamps
    out += "<div style='display:flex;gap:10px;font-size:10px;color:var(--tx2);margin-top:6px;flex-wrap:wrap;'>";
    if (orig) out += "<span>Original: "+orig.time+" ("+orig.cards.length+" cards)</span>";
    if (hasCurr) out += "<span>Updated: "+curr.time+" ("+curr.cards.length+" cards)</span>";
    out += "</div>";
  }

  out += "</div>"; // end slot-body

  // Footer buttons
  out += "<div class='slot-footer'>";
  if (!hasOrig) {
    out += "<button class='btn-primary' onclick='openModal(\""+tier.price+"\")'>Paste original checklist</button>";
  } else {
    out += "<button class='btn-primary' onclick='openModal(\""+tier.price+"\")'>Update checklist</button>";
    out += "<button class='btn-danger' onclick='resetSlot(\""+tier.price+"\")'>Reset</button>";
  }
  if (s.lastUpdated) out += "<span class='slot-time'>Last updated "+s.lastUpdated+"</span>";
  out += "</div>";

  out += "</div>"; // end slot
  return out;
}

// ── Custom price helpers ───────────────────────────────────────────────────────
function setCustomPrice() {
  var input = document.getElementById('custom-price-input');
  if (!input) return;
  var val = parseFloat(input.value);
  if (!val || val <= 0) { alert('Please enter a valid pack price.'); return; }
  state['custom'].customPrice = val;
  renderAll();
}

function resetCustomPrice() {
  state['custom'].customPrice = null;
  state['custom'].snapshots = [];
  state['custom'].lastUpdated = null;
  renderAll();
}

// ── Modal ──────────────────────────────────────────────────────────────────────
function openModal(priceKey) {
  activeModal = priceKey;
  var tier = TIERS.find(function(t){ return String(t.price) === String(priceKey); });
  var s = state[priceKey];
  var isFirst = s.snapshots.length === 0;
  var label = tier.custom ? 'Custom $' + s.customPrice : tier.label;
  document.getElementById("modal-title").textContent =
    isFirst ? "Paste original checklist — " + label : "Update checklist — " + label;
  document.getElementById("modal-sub").textContent =
    isFirst
      ? "Paste the full checklist from Fanatics when the pack first drops. This becomes your baseline."
      : "Paste the current remaining checklist. It will be compared against the original to show what's been pulled.";
  document.getElementById("modal-hint").textContent =
    "Tip: use the bookmarklet on the Fanatics checklist page to copy the data automatically.";
  document.getElementById("modal-ta").value = "";
  document.getElementById("modal").style.display = "flex";
  document.getElementById("modal-ta").focus();
}

function closeModal() {
  document.getElementById("modal").style.display = "none";
  activeModal = null;
}

function submitPaste() {
  if (!activeModal) return;
  var raw = document.getElementById("modal-ta").value.trim();
  if (!raw) return;
  var cards = parsePaste(raw);
  if (!cards.length) {
    alert("Could not parse any cards — check the format and try again.");
    return;
  }
  var s = state[activeModal];
  var snap = {cards:cards, time:timeStr(), ts:Date.now()};
  if (s.snapshots.length === 0) {
    s.snapshots = [snap];
  } else {
    s.snapshots = [s.snapshots[0], snap];
  }
  s.lastUpdated = timeStr();
  closeModal();
  renderAll();
}

function resetSlot(priceKey) {
  if (!confirm("Reset this slot? All snapshot data will be cleared.")) return;
  var isCustom = priceKey === 'custom';
  state[priceKey] = {snapshots:[], lastUpdated:null, customPrice: isCustom ? null : undefined};
  renderAll();
}

// Close modal on overlay click
document.getElementById("modal").addEventListener("click", function(e){
  if (e.target === this) closeModal();
});

// Initial render
renderAll();
</script>
